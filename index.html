<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Practicantes LEA - Musicala</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img id="brand-logo" src="logo.png" alt="Logo Musicala" />
      <div>
        <p class="eyebrow" id="modeLabel">Panel de consulta</p>
        <h1 id="brand-title">Practicantes LEA - Musicala</h1>
        <p id="brand-subtitle">CRUD, asistencia, evaluaciones, proyectos e informes conectados a Google Sheets</p>
      </div>
    </div>
    <div class="top-actions">
      <button class="btn secondary" id="refreshBtn" type="button">Actualizar</button>
      <button class="btn primary" id="setupBtn" type="button" hidden>Crear / actualizar estructura del Sheet</button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar no-print" aria-label="Navegacion principal">
      <button class="nav-item active" data-section="dashboard" type="button">Dashboard</button>
      <button class="nav-item" data-section="practicantes" type="button">Practicantes</button>
      <button class="nav-item" data-section="calendario" type="button">Calendario</button>
      <button class="nav-item" data-section="ajustes_horario" type="button">Ajustes horario</button>
      <button class="nav-item" data-section="actividades" type="button">Actividades</button>
      <button class="nav-item" data-section="evaluaciones" type="button">Evaluaciones</button>
      <button class="nav-item" data-section="retroalimentaciones" type="button">Retroalimentaciones</button>
      <button class="nav-item" data-section="proyectos" type="button">Proyectos</button>
      <button class="nav-item" data-section="informes" type="button">Informes</button>
      <button class="nav-item" data-section="configuracion" type="button" hidden>Configuracion / Estructura</button>
    </aside>

    <section class="content">
      <div id="status" class="status">Cargando panel...</div>
      <section id="view-dashboard" class="view active"></section>
      <section id="view-practicantes" class="view"></section>
      <section id="view-calendario" class="view"></section>
      <section id="view-ajustes_horario" class="view"></section>
      <section id="view-actividades" class="view"></section>
      <section id="view-evaluaciones" class="view"></section>
      <section id="view-retroalimentaciones" class="view"></section>
      <section id="view-proyectos" class="view"></section>
      <section id="view-informes" class="view"></section>
      <section id="view-configuracion" class="view"></section>
    </section>
  </main>

  <dialog id="recordModal" class="modal">
    <form id="recordForm" method="dialog" class="modal-card">
      <div class="modal-head">
        <div>
          <p class="eyebrow" id="modalKicker">Registro</p>
          <h2 id="modalTitle">Nuevo registro</h2>
        </div>
        <button id="closeModalBtn" class="icon-btn" value="cancel" type="button" aria-label="Cerrar">x</button>
      </div>
      <div id="formFields" class="form-grid"></div>
      <div class="modal-actions">
        <button class="btn secondary" id="cancelFormBtn" type="button">Cancelar</button>
        <button class="btn primary" id="saveFormBtn" type="submit">Guardar</button>
      </div>
    </form>
  </dialog>

  <script src="config.js"></script>
  <script src="schema.js"></script>
  <script src="app.js"></script>
</body>
</html>
